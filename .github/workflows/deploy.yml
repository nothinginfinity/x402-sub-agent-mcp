name: Deploy x402-sub-agent-mcp

on:
  push:
    branches: [main]
  workflow_dispatch: {}

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install dependencies
        run: npm install

      - name: Set MCP_AUTH_TOKEN secret (if configured)
        run: |
          if [ -n "$MCP_AUTH_TOKEN_VALUE" ]; then
            echo "$MCP_AUTH_TOKEN_VALUE" | npx wrangler secret put MCP_AUTH_TOKEN
          else
            echo "MCP_AUTH_TOKEN repo secret not set yet; skipping. All tool calls remain denied (fail-closed) until it is set."
          fi
        env:
          MCP_AUTH_TOKEN_VALUE: ${{ secrets.MCP_AUTH_TOKEN }}
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}

      - name: Deploy to Cloudflare Workers
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          wranglerVersion: "4"
          command: deploy
